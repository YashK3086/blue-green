name: Auto-Deploy-Blue-Green

on:
  push:
    branches: ["main"] # Triggers when you push to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          # These must match the Secret names you created in GitHub Settings
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: us-east-1

      - name: Update Rollout Image & Deploy
        run: |
          # 1. Update the image tag inside the app folder
          sed -i 's|image:.*|image: 593927188565.dkr.ecr.us-east-1.amazonaws.com/blue-green-app:v2|g' app/rollout.yaml

          # 2. Connect to your EKS Cluster
          aws eks update-kubeconfig --name blue-green-cluster --region us-east-1

          # 3. Apply the Analysis Template and the Rollout from the app folder
          kubectl apply -f app/analysis.yaml
          kubectl apply -f app/rollout.yaml

      - name: Verify Rollout Status
        run: |
          # Optional: This lets you see the status directly in the GitHub Action logs
          kubectl get rollout blue-green-rollout
