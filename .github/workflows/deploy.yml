name: Auto-Deploy-Blue-Green

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          # Using the Git Commit SHA as a unique version tag
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/blue-green-app:$IMAGE_TAG .
          docker push $ECR_REGISTRY/blue-green-app:$IMAGE_TAG
          echo "IMAGE_URL=$ECR_REGISTRY/blue-green-app:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Update Rollout Manifest
        run: |
          # This command swaps the old image line with the brand new one we just pushed
          sed -i "s|image: 593927188565.dkr.ecr.us-east-1.amazonaws.com/blue-green-app:.*|image: ${{ env.IMAGE_URL }}|" app/rollout.yaml

      - name: Push Manifests to EKS
        run: |
          aws eks update-kubeconfig --name blue-green-cluster --region us-east-1
          kubectl apply -f app/analysis.yaml
          kubectl apply -f app/rollout.yaml

      - name: Verify Argo Rollout Status
        run: |
          kubectl argo rollouts get rollout blue-green-rollout
