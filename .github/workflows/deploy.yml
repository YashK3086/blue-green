name: Auto-Deploy-Blue-Green

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/blue-green-app:$IMAGE_TAG ./app
          docker push $ECR_REGISTRY/blue-green-app:$IMAGE_TAG
          echo "IMAGE_URL=$ECR_REGISTRY/blue-green-app:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Update Rollout Manifest
        run: |
          sed -i "s|image: .*blue-green-app:.*|image: ${{ env.IMAGE_URL }}|" app/rollout.yaml

      - name: Push Manifests to EKS
        run: |
          aws eks update-kubeconfig --name blue-green-cluster --region us-east-1
          kubectl apply -f app/analysis.yaml
          kubectl apply -f app/rollout.yaml --validate=false

      - name: Success Confirmation
        run: |
          echo "Deployment triggered successfully. Argo is now handling the Blue-Green swap on EKS."
