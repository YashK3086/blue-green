apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: success-rate
spec:
  metrics:
    - name: web-check
      initialDelay: 40s # Increased to give the pod time to clear the Pending state
      interval: 10s
      count: 2
      successCondition: result == "true"
      provider:
        job:
          spec:
            template:
              spec:
                containers:
                  - name: check
                    image: alpine:latest
                    command: [sh, -c]
                    args:
                      [
                        "wget --spider -S --tries=3 http://blue-green-preview-service.default.svc.cluster.local 2>&1 | grep 'HTTP/1.1 200 OK' && echo true",
                      ]
                restartPolicy: Never
