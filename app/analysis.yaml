apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: success-rate-check
spec:
  metrics:
    - name: web-check
      interval: 20s
      count: 3
      consecutiveErrorLimit: 10
      successCondition: result == "200"
      provider:
        web:
          url: "http://blue-green-preview-service.default.svc.cluster.local/health.json"
          jsonPath: "{$.status}"
