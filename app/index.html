<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>V6 — Critical Failure</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(135deg, #4a0a0a 0%, #7d1212 40%, #b31b1b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .glow-bg {
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(239,68,68,0.18) 0%, transparent 70%);
      top: -100px; right: -100px;
      border-radius: 50%;
      animation: pulse 4s ease-in-out infinite;
    }

    .glow-bg2 {
      position: fixed;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(220,38,38,0.12) 0%, transparent 70%);
      bottom: -80px; left: -80px;
      border-radius: 50%;
      animation: pulse 4s ease-in-out infinite reverse;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.15); opacity: 1; }
    }

    .card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 24px;
      padding: 56px 64px;
      text-align: center;
      max-width: 640px;
      width: 90%;
      position: relative;
      z-index: 2;
      box-shadow: 0 32px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(239,68,68,0.1);
      animation: slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .badge {
      display: inline-block;
      background: linear-gradient(90deg, #ef4444, #dc2626);
      color: white;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 18px;
      border-radius: 100px;
      margin-bottom: 24px;
      box-shadow: 0 0 20px rgba(239,68,68,0.4);
      animation: glow 2s ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 0 20px rgba(239,68,68,0.4); }
      50% { box-shadow: 0 0 40px rgba(239,68,68,0.7); }
    }

    h1 {
      font-size: 54px;
      font-weight: 900;
      color: white;
      letter-spacing: -2px;
      line-height: 1.1;
      margin-bottom: 12px;
    }

    h1 span { color: #f87171; }

    .subtitle {
      color: rgba(255,255,255,0.55);
      font-size: 16px;
      font-weight: 400;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .divider {
      width: 60px; height: 3px;
      background: linear-gradient(90deg, #ef4444, #dc2626);
      border-radius: 2px;
      margin: 0 auto 36px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 36px;
    }

    .info-box {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 14px;
      padding: 18px;
      transition: transform 0.2s, border-color 0.2s;
    }

    .info-box:hover {
      transform: translateY(-3px);
      border-color: rgba(239,68,68,0.5);
    }

    .info-box .label {
      font-size: 11px;
      font-weight: 600;
      color: #f87171;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .info-box .value {
      font-size: 17px;
      font-weight: 700;
      color: white;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: rgba(255,255,255,0.6);
      font-size: 14px;
    }

    .dot {
      width: 10px; height: 10px;
      background: #ef4444;
      border-radius: 50%;
      box-shadow: 0 0 10px #ef4444;
      animation: blink 1.5s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="glow-bg"></div>
  <div class="glow-bg2"></div>
  <div class="card">
    <div class="badge">⚠️ Version 6 — Buggy Build</div>
    <h1>System<span> Outage</span><br/>Simulated</h1>
    <p class="subtitle">This forces Argo Rollouts to catch the failure.<br/>The V5 application will remain in production unharmed.</p>
    <div class="divider"></div>
    <div class="info-grid">
      <div class="info-box">
        <div class="label">Version</div>
        <div class="value">V6.0 (Bad)</div>
      </div>
      <div class="info-box">
        <div class="label">Health</div>
        <div class="value">Code 500</div>
      </div>
      <div class="info-box">
        <div class="label">Argo State</div>
        <div class="value">Auto-Reject</div>
      </div>
      <div class="info-box">
        <div class="label">Analysis</div>
        <div class="value">Failing...</div>
      </div>
    </div>
    <div class="status-row">
      <div class="dot"></div>
      <span>Argo Rollout — Aborting Release</span>
    </div>
  </div>
</body>
</html>
