apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: blue-green-rollout
  annotations:
    notifications.argoproj.io/subscribe.on-rollout-completed.slack: general
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blue-green
      env: blue
  template:
    metadata:
      labels:
        app: blue-green
        env: blue
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '80'
    spec:
      containers:
        - name: web-app
          image: 593927188565.dkr.ecr.us-east-1.amazonaws.com/blue-green-app:v4
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
  strategy:
    blueGreen:
      activeService: blue-green-service
      previewService: blue-green-preview-service
      # Promotion is paused until ALL prePromotionAnalysis templates pass.
      # If any template fails, Argo automatically aborts and rolls back.
      autoPromotionEnabled: false
      prePromotionAnalysis:
        templates:
          # Template 1: HTTP health check (existing)
          - templateName: success-rate-check
          # Template 2: OWASP ZAP DAST scan (new - Phase 4 Security)
          - templateName: zap-dast-security-check
        args:
          # Inject the preview service URL into the ZAP analysis template
          - name: preview-url
            value: "http://blue-green-preview-service.default.svc.cluster.local"
        initialDelay: 60s
