apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: blue-green-rollout
spec:
  replicas: 1
  strategy:
    blueGreen:
      activeService: blue-green-service
      previewService: blue-green-preview-service
      autoPromotionEnabled: true
  selector:
    matchLabels:
      app: blue-green
      env: blue
  template:
    metadata:
      labels:
        app: blue-green
        env: blue
    spec:
      containers:
        - name: web-app
          # Note: The GitHub Action below will automatically update this tag
          image: 593927188565.dkr.ecr.us-east-1.amazonaws.com/blue-green-app:v4
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
