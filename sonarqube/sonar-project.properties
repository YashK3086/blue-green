
# ============================================================
# DevOps-Blue-Green | SonarQube SAST Configuration
# sonar-project.properties
# ============================================================

# --- Project Identity ---
sonar.projectKey=devops-blue-green
sonar.projectName=DevOps Blue-Green Deployment Pipeline
sonar.projectVersion=1.0

# --- Source Code Analysis ---
# Scan the app source code and the Terraform IaC manifests.
# Paths are relative to the project root where sonar-scanner is executed.
sonar.sources=app,terraform

# --- File Exclusions ---
# Exclude auto-generated Terraform lock/state files and Docker cached layers.
sonar.exclusions=\
  **/.terraform/**,\
  **/terraform.tfstate,\
  **/terraform.tfstate.backup,\
  **/.terraform.lock.hcl,\
  **/node_modules/**,\
  **/*.min.js

# --- Language Configuration ---
# Allow SonarQube to detect HTML, JavaScript, and HCL (Terraform).
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# --- Encoding ---
sonar.sourceEncoding=UTF-8

# --- Quality Gate ---
# Fail the pipeline if the Quality Gate status is not "OK".
# This is enforced via the 'sonar.qualitygate.wait=true' scanner flag in Jenkins.
